apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync-system
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: volsync
      sourceRef:
        kind: HelmRepository
        name: backube-helm-charts
        namespace: flux-system
      version: "0.16.0"
  values:
    manageCRDs: true
    metrics:
      disableAuth: true