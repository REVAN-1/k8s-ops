apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
  namespace: woodpecker
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  releaseName: woodpecker
  chart:
    spec:
      chart: woodpecker
      version: "3.6.4"
      sourceRef:
        kind: HelmRepository
        name: woodpecker
        namespace: flux-system
  values:
    agent:
      env:
        WOODPECKER_BACKEND_K8S_STORAGE_CLASS: 'csi-rbd-sc'
        WOODPECKER_BACKEND_K8S_STORAGE_RWX: 'false'
        WOODPECKER_PLUGINS_PRIVILEGED: 'woodpeckerci/plugin-docker-buildx:6'
      persistence:
        enabled: true
        storageClass: csi-rbd-sc
        size: 1Gi
        accessModes:
          - ReadWriteOnce
    server:
      enabled: true
      extraSecretNamesForEnvFrom:
        - woodpecker-server-env
      env: 
        WOODPECKER_ADMIN: 'woodpecker,admin,revan'
        WOODPECKER_HOST: 'https://woodpecker.k8s.exmaple.com'
        WOODPECKER_FORGEJO: 'true'
        WOODPECKER_FORGEJO_URL: 'https://git.exmaple.com'
        WOODPECKER_PLUGINS_PRIVILEGED: 'woodpeckerci/plugin-docker-buildx:6'
      persistence:
        enabled: true
        storageClass: csi-rbd-sc
        size: 10Gi
      ingress: 
        enabled: true
        ingressClassName: 'cilium'
        tls:
          - hosts:
              - woodpecker.k8s.exmaple.com
        hosts:
          - host: woodpecker.k8s.exmaple.com
            paths:
              - path: /
                backend:
                  serviceName: woodpecker.k8s.exmaple.com
                  servicePort: 80

