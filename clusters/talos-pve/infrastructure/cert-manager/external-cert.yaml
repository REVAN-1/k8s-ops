apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: external-tls
  namespace: cert-manager
spec:
  secretName: external-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
  - "*.exmaple.com"   
  - "exmaple.com"     
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "nextcloud,authentik,gokapi,media,vaultwarden,matrix,cilium-secrets,jellyfin"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "nextcloud,authentik,gokapi,media,vaultwarden,matrix,cilium-secrets,jellyfin"
