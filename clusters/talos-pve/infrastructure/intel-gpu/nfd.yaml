apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
  namespace: intel-gpu
spec:
  interval: 10m
  chart:
    spec:
      chart: node-feature-discovery
      version: 0.18.3
      sourceRef:
        kind: HelmRepository
        name: node-feature-discovery
        namespace: flux-system
  maxHistory: 2
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    namespaceOverride: "intel-gpu"
    worker:
      config:
        core:
          sources:
            - pci
          labelSources:
            - pci
        sources:
          pci:
            deviceClassWhitelist:
              - "0300"  
              - "0302"  
            deviceLabelFields:
              - vendor
              - device
