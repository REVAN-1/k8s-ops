apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-gpu
  namespace: intel-gpu
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.36.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
  values:
    nodeSelector:
      feature.node.kubernetes.io/pci-8086_46a6.present: "true"
    name: intel-gpu-plugin
    sharedDevNum: 4
    allowIds: "8086:46a6"
    denyIds: ""
    allocationPolicy: "none"

