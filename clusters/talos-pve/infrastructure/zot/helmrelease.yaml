apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: zot
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  releaseName: zot
  chart:
    spec:
      chart: zot
      version: "0.1.119"
      sourceRef:
        kind: HelmRepository
        name: project-zot
        namespace: flux-system
  values:
    replicaCount: 1
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: zot
                app.kubernetes.io/instance: zot
            topologyKey: kubernetes.io/hostname
    ingress:
      enabled: true
      className: cilium
      pathtype: Prefix
      hosts:
        - host: registry.k8s.exmaple.com
          paths:
            - path: /
      tls:
        - hosts:
            - registry.k8s.exmaple.com
      
    mountConfig: true
    mountSecret: true
    persistence: true
    pvc:
      create: true
      name: zot-data
      storage: 50Gi
      storageClassName: csi-rbd-sc
      accessModes:
        - ReadWriteOnce


    extraVolumes:
      - name: zot-auth
        secret:
          secretName: zot-htpasswd
      - name: zot-tmp
        emptyDir:
          sizeLimit: 5Gi
      - name: zot-sync-download
        emptyDir:
          sizeLimit: 10Gi

    extraVolumeMounts:
      - name: zot-auth
        mountPath: /etc/zot/auth
        readOnly: true
      - name: zot-tmp
        mountPath: /tmp
      - name: zot-sync-download
        mountPath: /var/lib/zot-sync

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    configFiles:
      config.json: |
        {
          "distSpecVersion": "1.1.0",
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "dedupe": true,
            "gc": true,
            "commit": false
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "realm": "zot",
            "compat": ["docker2s2"],
            "auth": {
              "htpasswd": {
                "path": "/etc/zot/auth/htpasswd"
              }
            },
            "accessControl": {
              "repositories": {
                "**": {
                  "anonymousPolicy": ["read"],
                  "defaultPolicy": []
                }
              },
              "adminPolicy": {
                "users": ["registry"],
                "actions": ["read", "create", "update", "delete"]
              }
            }
          },
          "log": {
            "level": "info"
          },
          "extensions": {
            "search": {
              "enable": true,
              "cve": {
                "updateInterval": "12h",
                "trivy": {
                  "dbRepository": "ghcr.io/aquasecurity/trivy-db",
                  "javaDBRepository": "ghcr.io/aquasecurity/trivy-java-db"
                }
              }
            },
            "ui": {
              "enable": true
            },
            "scrub": {
              "enable": true,
              "interval": "24h"
            }
          }
        }