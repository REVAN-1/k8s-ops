apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: prometheus
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
      version: "86.2.2"
  values:
    fullnameOverride: prometheus
    crds:
      enabled: true
      upgradeJob:
        enabled: true
        forceConflicts: true

    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: true
        configReloaders: true
        general: true
        k8s: true
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: false
        kubeApiserverHistogram: false
        kubeApiserverSlos: false
        kubelet: true
        kubeProxy: true
        kubePrometheusGeneral: true
        kubePrometheusNodeRecording: true
        kubernetesApps: true
        kubernetesResources: true
        kubernetesStorage: true
        kubernetesSystem: true
        kubeScheduler: true
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: true
        prometheusOperator: true

    global:
      rbac:
        create: true

    alertmanager:
      enabled: true
      ingress:
        enabled: true
        ingressClassName: "nginx"
        hosts: 
          - altertmanager.k8s.exmaple.com
        path: /
        tls:
          - hosts:
              - altertmanager.k8s.exmaple.com

    grafana:
      envFromSecret: grafana-oidc
      grafana.ini:
        server:
          root_url: https://grafana-stack.k8s.exmaple.com
          serve_from_sub_path: false
        auth:
            signout_redirect_url: "https://idm.exmaple.com/application/o/grafana/end-session/"
            oauth_auto_login: true
        auth.generic_oauth:
            name: authentik
            enabled: true
            client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
            client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
            scopes: "openid profile email"
            auth_url: "https://idm.exmaple.com/application/o/authorize/"
            token_url: "https://idm.exmaple.com/application/o/token/"
            api_url: "https://idm.exmaple.com/application/o/userinfo/"
            role_attribute_path: contains(groups, 'admin') && 'Admin' || contains(groups, 'author') && 'Editor' || 'Viewer'
      enabled: true
      defaultDashboardsEnabled: true
      defaultDashboardsTimezone: "Europe/Berlin"
      sidecar:
        dashboards:
          searchNamespace: ALL
      serviceMonitor:
        enabled: true
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      ingress:
        enabled: true
        annotations: 
          kubernetes.io/ingress.class: cilium
        hosts: 
          - grafana-stack.k8s.exmaple.com
        path: /
        tls:
          - hosts:
              - grafana-stack.k8s.exmaple.com

    kubeApiServer:
      enabled: true

    kubelet:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - action: replace
            sourceLabels:
              - node
            targetLabel: instance

    kubeControllerManager:
      enabled: true
      endpoints: 
        - 10.50.0.41
        - 10.50.0.42
        - 10.50.0.43

    coreDns:
      enabled: true

    kubeDns:
      enabled: false

    kubeEtcd:
      enabled: true
      endpoints: 
        - 10.50.0.41
        - 10.50.0.42
        - 10.50.0.43
      service:
        enabled: true
        port: 2381
        targetPort: 2381

    kubeScheduler:
      enabled: true
      endpoints: 
        - 10.50.0.41
        - 10.50.0.42
        - 10.50.0.43

    kubeProxy:
      enabled: true
      endpoints: 
        - 10.50.0.41
        - 10.50.0.42
        - 10.50.0.43

    kubeStateMetrics:
      enabled: true

    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      selfMonitor:
        enabled: true
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels:
                - __meta_kubernetes_pod_node_name
              targetLabel: kubernetes_node

    nodeExporter:
      enabled: true
      serviceMonitor:
        relabelings:
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: kubernetes_node

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      podLabels:
        jobLabel: node-exporter
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
        - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
      service:
        portName: http-metrics
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels:
                - __meta_kubernetes_pod_node_name
              targetLabel: kubernetes_node
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 2048Mi

    prometheusOperator:
      enabled: true
      prometheusConfigReloader:
        resources:
          requests:
            cpu: 200m
            memory: 50Mi
          limits:
            memory: 100Mi

    prometheus:
      enabled: true
      prometheusSpec:
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector:
          any: true
        storageSpec:
          resources:
            limits:
              cpu: 400m
              memory: 1Gi
          volumeClaimTemplate:
            spec:
              storageClassName: csi-rbd-sc
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        replicas: 1
        replicaExternalLabelName: "replica"
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        retention: 15d
        enableAdminAPI: true
        walCompression: true
        scrapeInterval: 30s
        evaluationInterval: 60s

    thanosRuler:
      enabled: false


