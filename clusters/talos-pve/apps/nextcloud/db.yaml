apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-db
  namespace: nextcloud
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: 3
  stopDelay: 30
  smartShutdownTimeout: 180
  enablePDB: false
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: restart
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
    roles:
      - name: nextcloud
        superuser: true
        login: true
        passwordSecret:
          name: nextcloud-db-secret
  postgresql:
    synchronous:
      method: any
      number: 1          
    parameters:
      max_connections: "200"
  bootstrap:
    initdb:
      database: nextcloud
      owner: nextcloud
      secret:
        name: nextcloud-db-secret
  storage:
    size: 10Gi
    storageClass: csi-rbd-sc

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: garage

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: backup-nextcloud-postgresql
  namespace: nextcloud
spec:
  schedule: "0 0 18 * * *"
  backupOwnerReference: self
  cluster:
    name: nextcloud-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: garage
  namespace: nextcloud
spec:
  configuration:
    destinationPath: s3://k8s-postgresql/
    endpointURL: https://s3.int.exmaple.com
    s3Credentials:
      accessKeyId:
        name: garage-creds
        key: access-key-id
      secretAccessKey:
        name: garage-creds
        key: secret-access-key
      region:
        name: garage-creds
        key: region
    wal:
      compression: gzip
      maxParallel: 8
  retentionPolicy: 30d
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: nextcloud-db
  namespace: nextcloud
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - nextcloud
  selector:
    matchLabels:
      cnpg.io/cluster: nextcloud-db
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s