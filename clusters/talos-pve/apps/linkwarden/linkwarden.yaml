apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkwarden
  namespace: linkwarden
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: "5.0.1"
  values:
    controllers:
      linkwarden:
        strategy: Recreate
        containers:
          linkwarden: 
            image:
              repository: ghcr.io/linkwarden/linkwarden
              tag: "v2.14.1@sha256:31cf4bd2a2e111991fa5c9de03174c8698869c83722105c6ce529e4c911e6861"
            env:
              TZ: Europe/Berlin
              NEXTAUTH_URL: https://linkwarden.k8s.exmaple.com/api/v1/auth
              NEXT_PUBLIC_AUTHENTIK_ENABLED: true
              AUTHENTIK_ISSUER: https://idm.exmaple.com/application/o/linkwarden/
              MEILI_HOST: http://meilisearch:7700
            envFrom:
              - secretRef:
                  name: linkwarden-env
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 2Gi
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 0
                  periodSeconds: 5
                  timeoutSeconds: 2
                  failureThreshold: 30
      meilisearch:
        containers:
          meilisearch:
            image:
              repository: getmeili/meilisearch
              tag: "v1.12.8"            

    service:
      linkwarden:
        controller: linkwarden
        ports:
          http:
            port: 3000
      meilisearch:
        controller: meilisearch
        ports:
          http:
            port: 7700

    persistence:
      data:
        existingClaim: linkwarden-data
        advancedMounts:
          linkwarden:
            linkwarden:
               - path: /data/data        
      meilisearch-data:
        existingClaim: meilisearch-data
        advancedMounts:
          meilisearch:
            meilisearch:
               - path: /meili_data  

    ingress:
      linkwarden:
        className: "cilium"
        hosts:
          - host: "linkwarden.k8s.exmaple.com"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: linkwarden
                  port: http
        tls:
          - hosts:
              - "linkwarden.k8s.exmaple.com"   
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linkwarden-data
  namespace: linkwarden
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: csi-cephfs-sc
  resources:
    requests:
      storage: 5Gi           
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meilisearch-data
  namespace: linkwarden
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-rbd-sc
  resources:
    requests:
      storage: 5Gi      