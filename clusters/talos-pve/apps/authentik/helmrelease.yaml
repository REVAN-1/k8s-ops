apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      version: "2026.5.3"
  valuesFrom:
    - kind: Secret
      name: authentik-secrets
      valuesKey: values.yaml
  values:    
    global:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      affinity:
        podAntiAffinity: hard

    authentik:
        email:
          host: "mail.exmaple.com"
          port: 465
          username: "idm@exmaple.com"
          use_tls: false
          use_ssl: true
          timeout: 30
          from: "idm@exmaple.com"

        error_reporting:
            enabled: true
        postgresql:
          host: authentik-db-rw
          name: "authentik"
          user: "authentik"


    server:
      replicas: 2
      autoscaling:
        enabled: false
      env:
      - name: AUTHENTIK_DEFAULT_USER_CHANGE_EMAIL
        value: "true"
      - name: AUTHENTIK_DEFAULT_USER_CHANGE_NAME
        value: "true"
      - name: AUTHENTIK_DEFAULT_USER_CHANGE_USERNAME
        value: "true"
      ingress:
          ingressClassName: cilium
          enabled: true
          annotations:
          hosts:
            - idm.exmaple.com
          pathType: Prefix
          tls:
            - secretName: external-tls
              hosts:
                - idm.exmaple.com
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

      containerSecurityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

    worker: 
      replicas: 2
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      containerSecurityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

    postgresql:
        enabled: false

    geopip:
      enabled: true
      existingSecret:
        secretName: "geoip-creds"
        accountId: "account_id"
        licenseKey: "license_key"       
