apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja
  namespace: vikunja
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  releaseName: vikunja
  chart:
    spec:
      chart: vikunja
      version: "v2.0.2"
      sourceRef:
        kind: HelmRepository
        name: vikunja
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: vikunja-secrets
      valuesKey: values.yaml
  values:
    vikunja:
      image:
        repository: vikunja/vikunja       
        tag: "latest" 
      persistence:
        # This is where your Vikunja data lives,
        # provide an existing PVC or let one be autocreated
        data:
          enabled: true
          accessMode: ReadWriteOnce
          size: 2Gi
          mountPath: /app/vikunja/files
        database:
          enabled: false
        config:
          type: secret
          name: vikunja-config
      ingress:
        main:
          enabled: true
          hosts:
            - host: board.k8s.exmaple.com
              paths:
                - path: /
          tls:
            - hosts:
                - board.k8s.exmaple.com

      configMaps:
        config:
          enabled: false

      env: 
        VIKUNJA_SERVICE_PUBLICURL: "https://board.k8s.exmaple.com"
        VIKUNJA_DATABASE_HOST: "vikunja-db-rw"
        VIKUNJA_DATABASE_TYPE: "postgres"
        VIKUNJA_DATABASE_USER: "vikunja"
        VIKUNJA_DATABASE_DATABASE: "vikunja"
