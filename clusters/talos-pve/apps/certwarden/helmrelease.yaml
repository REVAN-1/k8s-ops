apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: certwarden
  namespace: certwarden
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: "5.0.1"
  values:
    controllers:
      certwarden:
        strategy: Recreate
        pod:
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - 1.1.1.1
              - 9.9.9.9
            options:
              - name: ndots
                value: "1"
        containers:
          certwarden:
            image:
              repository: ghcr.io/gregtwallace/certwarden
              tag: v0.29.6@sha256:b82b1f6028a2953898282268860d6e9a1e10bbd3bee0605ce157d62e286fecf4
            resources:
              requests:
                cpu: 100m
              limits:
                cpu: 200m
                memory: 512Mi

    service:
      certwarden:
        controller: certwarden
        ports:
          http:
            port: 4050

    ingress:
      certwarden:
        className: "cilium"
        hosts:
          - host: "certwarden.k8s.exmaple.com"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: certwarden
                  port: http
        tls:
          - hosts:
              - "certwarden.k8s.exmaple.com"

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /app/data