apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      version: "10.5.15"
  values:
    ingress:
      enabled: true
      annotations: 
        kubernetes.io/ingress.class: cilium
      hosts:
        - grafana.k8s.exmaple.com 
      tls: 
        - hosts:
            - grafana.k8s.exmaple.com
    persistence:
      type: pvc
      enabled: true
      storageClassName: csi-rbd-sc
      accessModes:
        - ReadWriteOnce
      size: 5Gi
    admin:
      existingSecret: "grafana-creds"
      userKey: admin-user
      passwordKey: admin-password
    envFromSecret: grafana-creds
    grafana.ini:
      server:
        root_url: https://grafana.k8s.exmaple.com
        serve_from_sub_path: false
      auth:
          signout_redirect_url: "https://idm.exmaple.com/application/o/grafana/end-session/"
          oauth_auto_login: true
      auth.generic_oauth:
          name: authentik
          enabled: true
          client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: "openid profile email"
          auth_url: "https://idm.exmaple.com/application/o/authorize/"
          token_url: "https://idm.exmaple.com/application/o/token/"
          api_url: "https://idm.exmaple.com/application/o/userinfo/"
          role_attribute_path: contains(groups, 'admin') && 'Admin' || contains(groups, 'author') && 'Editor' || 'Viewer'

    