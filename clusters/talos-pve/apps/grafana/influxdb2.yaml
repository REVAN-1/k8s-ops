apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influxdb-v2
  namespace: grafana
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: influxdb2
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: flux-system
      version: "2.1.2"
  values:
    persistence:
      enabled: true
      storageClass: "csi-rbd-sc"
      accessMode: ReadWriteOnce
      size: 8Gi
    adminUser:
      existingSecret: influxdb2-auth
    ingress:
      enabled: true
      tls: false
      hostname: influxdb-v2.k8s.exmaple.com
      className: cilium
    pdb:
      create: false