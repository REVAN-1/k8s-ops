apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influxdb-v3
  namespace: grafana
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: "5.0.1"
  values:
    controllers:
      influxdb-v3:
        strategy: Recreate
        initContainers:
          init-permissions:
            image:
              repository: busybox
              tag: "1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d"
            command: ["/bin/sh", "-c"]
            args:
              - |
                mkdir -p /var/lib/influxdb3/data /var/lib/influxdb3/plugins && \
                chown -R 1500:1500 /var/lib/influxdb3
            securityContext:
              runAsUser: 0
        containers:
          influxdb-v3:
            image:
              repository: influxdb
              tag: "3-core"
            command: ["influxdb3"]
            args:
              - "serve"
              - "--node-id=node0"
              - "--object-store=file"
              - "--data-dir=/var/lib/influxdb3/data"
              - "--query-file-limit=800"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 1024Mi

    service:
      influxdb-v3:
        controller: influxdb-v3
        ports:
          http:
            port: 8181

    persistence:
      data:
        existingClaim: influxdb-v3-data
        globalMounts:
          - path: /var/lib/influxdb3

    ingress:
      influxdb-v3:
        className: "cilium"
        hosts:
          - host: "influxdb-v3.k8s.exmaple.com"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: influxdb-v3
                  port: http    
      

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-v3-data
  namespace: grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-rbd-sc
  resources:
    requests:
      storage: 5Gi 