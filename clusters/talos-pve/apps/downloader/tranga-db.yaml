apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tranga-db
  namespace: downloader
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: 1
  stopDelay: 30
  smartShutdownTimeout: 180
  enablePDB: false
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
    roles:
      - name: tranga
        superuser: true
        login: true
        passwordSecret:
          name: tranga-db-secret
  bootstrap:
    initdb:
      database: tranga
      owner: tranga
      secret:
        name: tranga-db-secret
  storage:
    size: 5Gi
    storageClass: csi-rbd-sc

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: garage


---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: backup-tranga-postgresql
  namespace: downloader
spec:
  schedule: "0 0 18 * * *"
  backupOwnerReference: self
  cluster:
    name: tranga-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: garage
  namespace: downloader
spec:
  configuration:
    destinationPath: s3://k8s-postgresql/
    endpointURL: https://s3.int.exmaple.com
    s3Credentials:
      accessKeyId:
        name: garage-creds
        key: access-key-id
      secretAccessKey:
        name: garage-creds
        key: secret-access-key
      region:
        name: garage-creds
        key: region
    wal:
      compression: gzip
      maxParallel: 8
  retentionPolicy: 30d

