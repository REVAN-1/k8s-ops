apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyseerr
  namespace: media
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: "5.0.1"
  values:
    controllers:
      jellyseerr:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "false"
        containers:
          app: 
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: "latest"
            env:
              TZ: Europe/Berlin

    service:
      app:
        controller: jellyseerr
        ports:
          http:
            port: 5055

    persistence:
      config:
        existingClaim: jellyseerr-config
        advancedMounts:
          jellyseerr:
            app:
              - path: /app/config            

    ingress:
      app:
        className: "cilium"
        hosts:
          - host: "jellyseerr.exmaple.com"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - "jellyseerr.exmaple.com"
            secretName: external-tls
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyseerr-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-rbd-sc
  resources:
    requests:
      storage: 100Mi 