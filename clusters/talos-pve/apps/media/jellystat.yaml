apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellystat
  namespace: media
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true 
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: "5.0.1"
  valuesFrom:
    - kind: Secret
      name: jellystat-secrets
      valuesKey: values.yaml
  values:
    controllers:
      jellystat:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "false"
        containers:
          app: 
            image:
              repository: cyfershepard/jellystat
              tag: "latest"
            env:
              TZ: Europe/Berlin
              POSTGRES_USER: jellystat
              POSTGRES_IP: jellystat-db-rw
              POSTGRES_PORT: 5432

    service:
      app:
        controller: jellystat
        ports:
          http:
            port: 3000

    persistence:
      config:
        existingClaim: jellystat-config
        advancedMounts:
          jellystat:
            app:
              - path: /app/backend/backup-data          

    ingress:
      app:
        className: "cilium"
        hosts:
          - host: "jellystat.k8s.exmaple.com"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - "jellystat.k8s.exmaple.com"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellystat-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-rbd-sc
  resources:
    requests:
      storage: 500Mi 