apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.8"
    registry: ghcr.io/fluxcd
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  sync:
    kind: GitRepository
    url: https://git.exmaple.com/revan/k8s-ops.git
    ref: refs/heads/main
    path: ./clusters/talos-pve/flux-system
    pullSecret: flux-system