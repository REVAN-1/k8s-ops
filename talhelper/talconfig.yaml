---
clusterName: talos-pve
talosVersion: v1.13.2
kubernetesVersion: v1.35.4
endpoint: https://10.50.0.40:6443
allowSchedulingOnMasters: false
patches:
  - |-
    - op: add
      path: /machine/kubelet/extraArgs
      value:
        rotate-server-certificates: "true"
  - |-
    - op: add
      path: /cluster/extraManifests
      value:
        - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/main/deploy/standalone-install.yaml
        - https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  - |- 
    cluster:
      network:
        cni:
          name: none
      proxy:
        disabled: true

controlPlane:
  patches:
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
            - os:etcd:backup
            allowedKubernetesNamespaces:
            - talos    
    - |- 
      machine:
        network:
          interfaces:
          - interface: ens18
            vip:
              ip: 10.50.0.40    
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

nodes:
  - hostname: master01
    ipAddress: 10.50.0.41
    controlPlane: true
    nameservers:
      - 10.50.0.5
    installDisk: /dev/sda
    talosImageURL:  factory.talos.dev/metal-installer/a7bcadbc1b6d03c0e687be3a5d9789ef7113362a6a1a038653dfd16283a92b6b
    networkInterfaces:
      - interface: ens18
        routes:
          - network: 0.0.0.0/0
            gateway: 10.50.0.5

  - hostname: master02
    ipAddress: 10.50.0.42
    controlPlane: true
